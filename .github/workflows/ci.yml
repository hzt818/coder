# CI — 自动编译与测试
#
# 在每次 push / PR 时自动编译项目并运行测试。
# 覆盖默认特性、最小特性和全特性三种场景。

name: ci

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ──────────────────────────────────────────────
  # 1. 代码格式与静态检查
  # ──────────────────────────────────────────────
  check:
    name: 代码检查
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup component add clippy rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libasound2-dev pkg-config

      - name: 格式检查
        run: cargo fmt --all --check

      - name: Clippy 检查
        run: cargo clippy --all-targets

  # ──────────────────────────────────────────────
  # 2. 编译验证（三类编译配置）
  # ──────────────────────────────────────────────
  build:
    name: 编译 (${{ matrix.name }})
    needs: [check]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: 默认特性
            features: ""
            os: ubuntu-latest

          - name: 最小特性
            features: --no-default-features --features ai-openai
            os: ubuntu-latest

          - name: 全特性
            features: --features "ai-openai,ai-anthropic,ai-google,ai-opencode,tools-git,team,skill,subagent,memory,storage,security,server,mcp,lsp"
            os: ubuntu-latest

          - name: macOS
            features: ""
            os: macos-latest

          - name: Windows
            features: ""
            os: windows-latest

    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        run: rustup toolchain install stable --profile minimal --no-self-update

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ matrix.name }}

      - name: 安装系统依赖 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libasound2-dev libdbus-1-dev pkg-config

      - name: 编译
        run: cargo build ${{ matrix.features }}

  # ──────────────────────────────────────────────
  # 3. 测试
  # ──────────────────────────────────────────────
  test:
    name: 测试
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust
        run: rustup toolchain install stable --profile minimal --no-self-update

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: test

      - name: 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libasound2-dev libdbus-1-dev pkg-config

      - name: 运行全部测试
        run: cargo test

      - name: 运行最小特性测试
        run: cargo test --no-default-features --features ai-openai

  # ──────────────────────────────────────────────
  # 4. 发布构建（仅在 tag 推送时）
  # ──────────────────────────────────────────────
  release:
    name: 发布构建
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: coder-linux-amd64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: coder-linux-arm64

          - target: x86_64-apple-darwin
            os: macos-13
            artifact: coder-macos-amd64

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: coder-macos-arm64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: coder-windows-amd64.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: 安装 Rust + target
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: release-${{ matrix.target }}

      - name: 安装系统依赖 (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq libasound2-dev libdbus-1-dev pkg-config
          if [ '${{ matrix.target }}' = 'aarch64-unknown-linux-gnu' ]; then
            sudo apt-get install -y -qq gcc-aarch64-linux-gnu
          fi

      - name: Release 构建
        run: cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: 剥离符号表 (Unix)
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/coder 2>/dev/null || true

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            target/${{ matrix.target }}/release/coder
            target/${{ matrix.target }}/release/coder.exe
          compression-level: 0
          if-no-files-found: error
