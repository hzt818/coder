name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            ext: ""
            features: "ai-openai,ai-anthropic,ai-opencode"
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            ext: ""
            features: "ai-openai,ai-anthropic,ai-opencode"
          - target: x86_64-unknown-linux-musl
            os: ubuntu-24.04
            ext: ""
            features: "ai-openai"
          - target: x86_64-apple-darwin
            os: macos-14
            ext: ""
            features: "ai-openai,ai-anthropic,ai-opencode"
          - target: aarch64-apple-darwin
            os: macos-14
            ext: ""
            features: "ai-openai,ai-anthropic,ai-opencode"
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            ext: ".exe"
            features: "ai-openai,ai-anthropic,ai-opencode"
          - target: aarch64-pc-windows-msvc
            os: windows-2022
            ext: ".exe"
            features: "ai-openai,ai-anthropic,ai-opencode"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: contains(matrix.target, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            libfontconfig-dev

      - name: Install musl-tools (Linux musl)
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get install -y musl-tools

      - name: Build
        run: |
          FEATURES="${{ matrix.features }}"
          cargo build --release --target ${{ matrix.target }} --features "$FEATURES"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: coder-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/coder${{ matrix.ext }}
          if-no-files-found: error

  build-all-features:
    name: all-features-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            ext: ""
          - target: x86_64-apple-darwin
            os: macos-14
            ext: ""
          - target: x86_64-pc-windows-msvc
            os: windows-2022
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install system dependencies (Linux)
        if: contains(matrix.target, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            pkg-config \
            libssl-dev \
            libdbus-1-dev \
            libfontconfig-dev

      - name: Build with all features
        run: |
          cargo build --release --target ${{ matrix.target }} \
            --features "ai-openai,ai-anthropic,ai-google,ai-opencode,tools-git,tools-docker,tools-db,tools-oauth,team,skill,subagent,memory,storage,server,mcp,lsp,sync,voice,oauth,analytics,permission,computer,worktree"

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: coder-${{ matrix.target }}-all-features
          path: target/${{ matrix.target }}/release/coder${{ matrix.ext }}
          if-no-files-found: error

  test:
    name: test-${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
          - target: x86_64-apple-darwin
            os: macos-14
          - target: x86_64-pc-windows-msvc
            os: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Linux)
        if: contains(matrix.target, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev libfontconfig-dev

      - name: Run tests
        run: cargo test --features "ai-openai,ai-anthropic,ai-opencode"

  lint:
    name: lint
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev libdbus-1-dev libfontconfig-dev

      - name: Clippy
        run: cargo clippy --all-targets --features "ai-openai,ai-anthropic,ai-opencode" -- -D warnings

      - name: Format check
        run: cargo fmt --check
