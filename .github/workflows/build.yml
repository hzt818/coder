# Coder — Multi-Platform Build & CI Workflow
#
# Builds, tests, and packages coder for Linux (x86_64/aarch64),
# macOS (x86_64/aarch64), and Windows (x86_64). Also supports
# npm-based binary distribution (like @anthropic/claude-code).

name: build

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish to npm (requires npm-token secret)"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

# Cancel in-progress runs for the same branch (except on tags)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  # ===== 1. Format & Lint =====
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup component add clippy rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - run: cargo fmt --all --check
      - run: cargo clippy --all-targets -- -D warnings

  # ===== 2. Test =====
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system dependencies
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libasound2-dev pkg-config libdbus-1-dev

      - run: cargo test
      - run: cargo test --no-default-features --features ai-openai

  # ===== 3. Build Matrix — all platforms =====
  build:
    name: Build (${{ matrix.target }})
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: coder-linux-x86_64

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            artifact_name: coder-linux-aarch64

          - target: x86_64-apple-darwin
            os: macos-13
            artifact_name: coder-macos-x86_64

          - target: aarch64-apple-darwin
            os: macos-latest
            artifact_name: coder-macos-aarch64

          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact_name: coder-windows-x86_64.exe

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ matrix.target }}

      # Linux aarch64 cross-compilation dependencies
      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo dpkg --add-architecture arm64
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            gcc-aarch64-linux-gnu \
            libasound2-dev:arm64 \
            libdbus-1-dev:arm64 \
            pkg-config-aarch64-linux-gnu || true

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }} --all-features
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: 1
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig

      - name: Strip binary (Linux)
        if: startsWith(matrix.target, 'x86_64-unknown-linux') || matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          if command -v aarch64-linux-gnu-strip &>/dev/null; then
            aarch64-linux-gnu-strip target/${{ matrix.target }}/release/coder
          else
            strip target/${{ matrix.target }}/release/coder
          fi

      - name: Strip binary (macOS)
        if: startsWith(matrix.target, 'aarch64-apple-darwin') || matrix.target == 'x86_64-apple-darwin'
        run: strip -d target/${{ matrix.target }}/release/coder 2>/dev/null || true

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            target/${{ matrix.target }}/release/coder
            target/${{ matrix.target }}/release/coder.exe
          compression-level: 0
          if-no-files-found: error

  # ===== 4. npm Package =====
  npm:
    name: npm Package
    if: >
      github.ref == 'refs/heads/master'
      || startsWith(github.ref, 'refs/tags/v')
      || (github.event_name == 'workflow_dispatch' && inputs.publish_npm)
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Prepare npm package
        run: |
          set -e
          mkdir -p npm-package/bin

          PLATFORMS="linux-x86_64 linux-aarch64 macos-x86_64 macos-aarch64 windows-x86_64"
          for plat in $PLATFORMS; do
            dir="${{ github.workspace }}/artifacts/coder-${plat}"
            if [ -d "$dir" ]; then
              mkdir -p "npm-package/bin/${plat}"
              # Copy whichever binary file exists (coder or coder.exe)
              find "$dir" -maxdepth 1 -type f -exec cp {} "npm-package/bin/${plat}/" \;
              echo "Copied artifacts for ${plat}"
            else
              echo "Warning: no artifacts found for ${plat}"
            fi
          done

      - name: Write npm package.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"

          cat > npm-package/package.json << PKGJSON
          {
            "name": "coder",
            "version": "${VERSION}",
            "description": "AI-powered terminal development environment — Rust-based CLI",
            "bin": {
              "coder": "./install.js"
            },
            "repository": {
              "type": "git",
              "url": "git+https://github.com/${GITHUB_REPOSITORY}.git"
            },
            "keywords": ["ai", "coding", "terminal", "tui", "rust"],
            "license": "MIT",
            "os": ["linux", "darwin", "win32"],
            "cpu": ["x64", "arm64"],
            "engines": {
              "node": ">=18"
            }
          }
          PKGJSON

      - name: Write install.js
        run: |
          cat > npm-package/install.js << 'INSTALLJS'
          #!/usr/bin/env node
          const { spawnSync } = require("child_process");
          const path = require("path");
          const fs = require("fs");

          const platformMap = {
            linux: { x64: "linux-x86_64", arm64: "linux-aarch64" },
            darwin: { x64: "macos-x86_64", arm64: "macos-aarch64" },
            win32: { x64: "windows-x86_64" },
          };

          const plat = platformMap[process.platform];
          if (!plat) {
            console.error("Unsupported platform:", process.platform);
            process.exit(1);
          }

          const arch = plat[process.arch];
          if (!arch) {
            console.error("Unsupported architecture:", process.arch);
            process.exit(1);
          }

          const binDir = path.join(__dirname, "bin", arch);
          let binPath = path.join(binDir, "coder");

          // Windows uses .exe
          if (process.platform === "win32") {
            binPath += ".exe";
          }

          if (!fs.existsSync(binPath)) {
            console.error("Binary not found for", process.platform, process.arch);
            console.error("Looked at:", binPath);
            process.exit(1);
          }

          const result = spawnSync(binPath, process.argv.slice(2), {
            stdio: "inherit",
          });

          process.exit(result.status ?? 1);
          INSTALLJS
          chmod +x npm-package/install.js

      - name: Write README
        run: |
          cat > npm-package/README.md << 'README'
          # Coder

          AI-powered terminal development environment.

          ## Install

          ```bash
          npm install -g coder
          ```

          ## Usage

          ```bash
          coder
          coder --help
          ```
          README

      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_npm
        run: |
          cd npm-package
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: npm publish dry-run
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && !inputs.publish_npm }}
        run: |
          cd npm-package
          npm publish --dry-run

  # ===== 5. GitHub Release (tags only) =====
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            base=$(basename "$dir")
            find "$dir" -maxdepth 1 -type f -exec cp {} "release-assets/${base}" \;
          done
          ls -la release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Coder ${{ github.ref_name }}
          files: release-assets/*
          generate_release_notes: true
