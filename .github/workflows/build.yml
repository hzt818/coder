# Coder — Multi-Platform Build & CI Workflow
#
# Builds, tests, and packages coder for Linux (x86_64/aarch64),
# macOS (x86_64/aarch64), and Windows (x86_64). Also supports
# npm-based binary distribution (like @anthropic/claude-code).

name: build

on:
  push:
    branches: [master, main]
    tags: ["v*"]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      publish_npm:
        description: "Publish to npm (requires npm-token secret)"
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

# ---------------------------------------------------------------------------
# Concurrency: cancel in-progress runs for the same branch (except on tags)
# ---------------------------------------------------------------------------
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

jobs:
  # -----------------------------------------------------------------------
  # 1. Lint & Format Check
  # -----------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup component add clippy rustfmt

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

  # -----------------------------------------------------------------------
  # 2. Test (on Ubuntu)
  # -----------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --no-self-update

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Install system deps
        run: sudo apt-get update -qq && sudo apt-get install -y -qq libasound2-dev pkg-config

      - name: cargo test (default features)
        run: cargo test

      - name: cargo test (all features)
        run: cargo test --features "$ALL_FEATURES"
        env:
          ALL_FEATURES: ai-openai,ai-anthropic,ai-google,ai-opencode,tools-git,tools-docker,tools-db,tools-oauth,team,skill,subagent,memory,storage,server,mcp,lsp,sync,voice,oauth,analytics,permission,computer,worktree

      - name: cargo test (no-default-features)
        run: cargo test --no-default-features --features ai-openai

  # -----------------------------------------------------------------------
  # 3. Build Matrix — all platforms
  # -----------------------------------------------------------------------
  build:
    name: Build (${{ matrix.target }})
    needs: [lint, test]
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-24.04
            artifact_name: coder-linux-x86_64
            cross: false

          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04
            artifact_name: coder-linux-aarch64
            cross: true

          - target: x86_64-apple-darwin
            os: macos-14
            artifact_name: coder-macos-x86_64
            cross: false

          - target: aarch64-apple-darwin
            os: macos-14
            artifact_name: coder-macos-aarch64
            cross: false

          - target: x86_64-pc-windows-msvc
            os: windows-2025
            artifact_name: coder-windows-x86_64.exe
            cross: false

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup target add ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          key: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux aarch64)
        if: matrix.cross
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gcc-aarch64-linux-gnu libasound2-dev:arm64

      - name: cargo build --release
        run: cargo build --release --target ${{ matrix.target }} --all-features
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_ALLOW_CROSS: 1

      - name: Strip binary
        if: runner.os != 'Windows'
        run: strip target/${{ matrix.target }}/release/coder

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: target/${{ matrix.target }}/release/coder${{ runner.os == 'Windows' && '.exe' || '' }}
          compression-level: 0
          if-no-files-found: error

  # -----------------------------------------------------------------------
  # 4. npm Package — prepare & publish
  # -----------------------------------------------------------------------
  npm:
    name: npm Package
    # Run on:
    #   - pushes to master (validate package.json)
    #   - version tags (publish or dry-run)
    #   - workflow_dispatch with publish_npm=true
    if: >
      github.ref == 'refs/heads/master'
      || startsWith(github.ref, 'refs/tags/v')
      || (github.event_name == 'workflow_dispatch' && inputs.publish_npm)
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Prepare npm package
        run: |
          # Create the npm package directory structure
          mkdir -p npm-package/bin

          # Copy platform binaries
          PLATFORMS="linux-x86_64 linux-aarch64 macos-x86_64 macos-aarch64 windows-x86_64"
          for plat in $PLATFORMS; do
            src="${{ github.workspace }}/artifacts/coder-${plat}"
            if [ -f "$src" ] || [ -f "${src}.exe" ]; then
              mkdir -p "npm-package/bin/${plat}"
              cp "${src}"* "npm-package/bin/${plat}/"
            fi
          done

      - name: Write npm package.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION="${VERSION:-0.1.0}"
          echo "PKG_VERSION=${VERSION}" >> "${GITHUB_ENV}"

          cat > npm-package/package.json << PKGJSON
          {
            "name": "coder",
            "version": "${VERSION}",
            "description": "AI-powered terminal development environment — Rust-based CLI",
            "bin": {
              "coder": "./install.js"
            },
            "repository": {
              "type": "git",
              "url": "git+https://github.com/${GITHUB_REPOSITORY}.git"
            },
            "keywords": ["ai", "coding", "terminal", "tui", "rust"],
            "license": "MIT",
            "os": ["linux", "darwin", "win32"],
            "cpu": ["x64", "arm64"],
            "engines": {
              "node": ">=18"
            }
          }
          PKGJSON

      - name: Write install script
        run: |
          cat > npm-package/install.js << 'INSTALLJS'
          #!/usr/bin/env node
          /**
           * Coder — platform-aware binary installer
           *
           * Detects the current platform/architecture and runs the correct
           * compiled binary, downloaded at npm install time.
           */
          const { spawnSync } = require("child_process");
          const path = require("path");

          const platformMap = {
            linux: { x64: "linux-x86_64", arm64: "linux-aarch64" },
            darwin: { x64: "macos-x86_64", arm64: "macos-aarch64" },
            win32: { x64: "windows-x86_64" },
          };

          const plat = platformMap[process.platform];
          if (!plat) {
            console.error("Unsupported platform:", process.platform);
            process.exit(1);
          }

          const arch = plat[process.arch];
          if (!arch) {
            console.error("Unsupported architecture:", process.arch);
            process.exit(1);
          }

          const ext = process.platform === "win32" ? ".exe" : "";
          const binPath = path.join(__dirname, "bin", arch, "coder" + ext);

          const result = spawnSync(binPath, process.argv.slice(2), {
            stdio: "inherit",
          });

          process.exit(result.status ?? 1);
          INSTALLJS

          chmod +x "${{ github.workspace }}/npm-package/install.js"

      - name: Write README
        run: |
          cat > npm-package/README.md << 'README'
          # Coder

          AI-powered terminal development environment.

          ## Install

          ```bash
          npm install -g coder
          ```

          ## Usage

          ```bash
          coder
          coder --help
          ```
          README

      # Publish to npm (or dry-run)
      - name: Publish to npm
        if: startsWith(github.ref, 'refs/tags/v') || inputs.publish_npm
        run: |
          cd npm-package
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: npm publish dry-run
        if: ${{ !startsWith(github.ref, 'refs/tags/v') && !inputs.publish_npm }}
        run: |
          cd npm-package
          npm publish --dry-run

  # -----------------------------------------------------------------------
  # 5. GitHub Release (only on version tags)
  # -----------------------------------------------------------------------
  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Organize release assets
        run: |
          mkdir -p release-assets
          for dir in artifacts/*/; do
            base=$(basename "$dir")
            cp -r "$dir"/* "release-assets/${base}"
          done
          ls -la release-assets/

      - name: Generate release notes
        run: |
          cat > release-notes.md << 'EOF'
          ## Coder ${{ github.ref_name }}

          ### Installation

          ```bash
          # Via npm (recommended)
          npm install -g coder

          # Or download the binary for your platform from the assets below.
          ```

          ### Platform Support

          | Asset | Platform |
          |-------|----------|
          | \`coder-linux-x86_64\` | Linux x86_64 |
          | \`coder-linux-aarch64\` | Linux ARM64 |
          | \`coder-macos-x86_64\` | macOS Intel |
          | \`coder-macos-aarch64\` | macOS Apple Silicon |
          | \`coder-windows-x86_64.exe\` | Windows x86_64 |

          ### Changelog

          See the [commit history](https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}) for details.
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Coder ${{ github.ref_name }}
          body_path: release-notes.md
          files: release-assets/*
          generate_release_notes: false
